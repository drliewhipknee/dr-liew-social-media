name: LinkedIn Post (8:00am ACST)

on:
  schedule:
    - cron: '30 22 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date YYYY-MM-DD (leave blank for today)'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run poster
        env:
          LI_ACCESS_TOKEN: ${{ secrets.LI_ACCESS_TOKEN }}
          LI_PERSONAL_URN: ${{ secrets.LI_PERSONAL_URN }}
          INPUT_DATE: ${{ github.event.inputs.date }}
        run: |
          if [ -n "$INPUT_DATE" ]; then
            python poster.py --platform linkedin --date "$INPUT_DATE"
          else
            python poster.py --platform linkedin
          fi
